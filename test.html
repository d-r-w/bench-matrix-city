<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Matrix City</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; cursor: pointer; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0f0; font-family: monospace; font-size: 24px; pointer-events: none;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0a0; z-index: 10;
            letter-spacing: 4px; animation: pulse 1.5s ease-in-out infinite;
            background: rgba(0,8,2,0.6); padding: 20px 40px; border: 1px solid #0f03;
            backdrop-filter: blur(4px);
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #error {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #f44; font-family: monospace; font-size: 18px; pointer-events: none;
            text-shadow: 0 0 5px #f44; z-index: 20; display: none;
            text-align: center; max-width: 80vw;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">[ CONNECTING TO THE MATRIX ]</div>
    <div id="error"></div>

    <script type="module">
        import * as THREE from 'three';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';


        const GRID = 16;
        const CELL = 4.2;
        const BUILDING_WIDTH = 3.6;


        let scene, camera, renderer, composer;
        const clock = new THREE.Clock();


        const CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ' +
            'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピ' +
            'ウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペ' +
            'オォコソトノホモヨョロゴゾドボポヴッン⟨⟩{}[]|/\\+=<>!@#$%&';


        const charToIndex = new Map();
        for (let i = 0; i < CHARS.length; i++) charToIndex.set(CHARS[i], i);


        function randChar() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }



        const ATLAS_COLS = 32;
        const ATLAS_ROWS = 16;
        const CELL_SIZE = 128;


        const { texture: atlasTex } = buildTextureAtlas();

        function buildTextureAtlas() {
            const w = ATLAS_COLS * CELL_SIZE;
            const h = ATLAS_ROWS * CELL_SIZE;
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');


            ctx.shadowColor = '#00ff41';

            for (let i = 0; i < CHARS.length; i++) {
                const col = i % ATLAS_COLS;
                const row = Math.floor(i / ATLAS_COLS);


                if (i >= ATLAS_COLS * ATLAS_ROWS) break;

                const x = col * CELL_SIZE + CELL_SIZE / 2;
                const y = row * CELL_SIZE + CELL_SIZE / 2;


                const bright = i < CHARS.length / 2;
                ctx.shadowBlur = bright ? 8 : 4;

                ctx.fillStyle = bright ? '#55ff77' : '#00dd44';
                ctx.font = `${CELL_SIZE * 0.7}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(CHARS[i], x, y + 4);
            }

            const tex = new THREE.CanvasTexture(c);

            tex.minFilter = THREE.NearestFilter;
            tex.magFilter = THREE.NearestFilter;


            tex.flipY = false;
            tex.generateMipmaps = false;
            return { texture: tex, cols: ATLAS_COLS, rows: ATLAS_ROWS };
        }


        const MAX_CACHE_SIZE = 512;
        const texCache = new Map();

        function getCharTex(char, opts) {
            const key = `${char}_${opts.bright ? 'B' : 'N'}_${opts.size || 90}`;
            if (!texCache.has(key)) {
                while (texCache.size >= MAX_CACHE_SIZE) {
                    texCache.delete(texCache.keys().next().value);
                }
                texCache.set(key, makeCharTexture(char, opts));
            }
            return texCache.get(key);
        }

        function makeCharTexture(char, opts = {}) {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 128;
            const ctx = c.getContext('2d');

            const grd = ctx.createRadialGradient(64, 64, 5, 64, 64, 55);
            grd.addColorStop(0, opts.bright ? 'rgba(0,255,65,0.15)' : 'rgba(0,255,65,0.04)');
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 128, 128);

            ctx.fillStyle = opts.bright ? '#55ff77' : '#00dd44';
            ctx.shadowColor = '#00ff41';
            ctx.shadowBlur = opts.bright ? 20 : 8;
            ctx.font = `${opts.size || 90}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, 64, 68);

            const tex = new THREE.CanvasTexture(c);
            tex.minFilter = THREE.NearestFilter;
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }


        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000802, 0.004);
        scene.background = new THREE.Color(0x000301);

            // Subtle ambient light so building geometry is visible
            const ambLight = new THREE.AmbientLight(0x00ff41, 0.08);
            scene.add(ambLight);

            // Faint directional light from above for building form
            const dirLight = new THREE.DirectionalLight(0x00aa30, 0.12);
            dirLight.position.set(0, 80, 0);
            scene.add(dirLight);

            // Camera-following point light for local building illumination
            const camLight = new THREE.PointLight(0x00ff41, 0.6, 35);
            scene.add(camLight);
            window._camLight = camLight;

            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 400);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
            renderer.setSize(innerWidth, innerHeight);
            document.body.appendChild(renderer.domElement);

            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.9;

            const rp = new RenderPass(scene, camera);
            composer = new EffectComposer(renderer);

            const bloom = new UnrealBloomPass(
                new THREE.Vector2(innerWidth, innerHeight), 0.72, 0.038, 0.35
            );
            composer.addPass(rp);
            composer.addPass(bloom);

            // Vignette + color grading pass
            const vignetteShader = {
                uniforms: {
                    tDiffuse: { value: null },
                    darkness: { value: 2.0 },
                    offset: { value: 1.4 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float darkness;
                    uniform float offset;
                    varying vec2 vUv;
                    void main() {
                        vec4 texel = texture2D(tDiffuse, vUv);
                        vec2 uv = (vUv - 0.5) * 2.0;
                        float vig = clamp(offset - dot(uv, uv) * darkness * 0.35, 0.0, 1.0);
                        vec3 shadowTint = mix(vec3(0.0, 0.08, 0.02), vec3(1.0), vig);
                        texel.rgb *= shadowTint;
                        // Slight green tint + contrast curve
                        vec3 graded = texel.rgb * vec3(0.95, 1.05, 0.9);
                        graded = pow(graded, vec3(1.05));
                        texel.rgb = graded;
                        gl_FragColor = texel;
                    }
                `
            };
            const vignettePass = new ShaderPass(vignetteShader);
            composer.addPass(vignettePass);

            buildCity();
            buildGroundGrid();
            buildRain();
            buildHazeLayers();
            buildLightBeams();
            buildStarfield();

            document.getElementById('loading').style.display = 'none';
            setTimeout(startDroneFlythrough, 600);

            addEventListener('resize', onResize);
        }


        const buildingHeights = [];

        // ── Helpers for city generation ───────────────────────────────

        function calcBuildingHeight(gx, gz) {
            const dist = Math.sqrt(gx * gx + gz * gz);
            let maxH = Math.max(5, 48 - dist * 1.5);
            maxH += (Math.random() - 0.5) * 12;
            // Create landmark skyscrapers near center
            if (dist < 4 && Math.random() > 0.5) maxH = Math.floor(maxH * 1.6);
            return Math.floor(maxH);
        }

        function isRoadCell(gx, gz) {
            return gx % 2 === 0 || gz % 2 === 0;
        }

        function fillChance(dist) {
            return Math.max(0.35, 0.7 - dist * 0.04);
        }

        function charSpacingForDist(dist) {
            return Math.max(0.3, 0.28 + dist * 0.01);
        }

        function floorSkipForDist(dist) {
            return dist < 6 ? 1 : (dist < 10 ? 2 : 3);
        }

        function glyphBrightness(faceSign, floorH, maxH) {
            let shadow = 1.0;
            if (faceSign === -1) shadow *= 0.6;   // back/left faces darker
            if (floorH < maxH * 0.2) shadow *= 0.7; // lower floors slightly darker
            return Math.random() > 0.6 ? shadow : shadow * 0.45;
        }

        function pushGlyph(positions, charIndices, brightFlags, px, py, pz, chIdx, bright) {
            positions.push(px, py, pz);
            charIndices.push(chIdx);
            brightFlags.push(bright);
        }

        function addWallChars(positions, charIndices, brightFlags, bx, bz, maxH, dist) {
            const hw = BUILDING_WIDTH / 2;
            const spacing = charSpacingForDist(dist);
            const charsOnEdge = Math.floor((hw * 2) / spacing);
            const floorSkip = floorSkipForDist(dist);

            const faceDefs = [
                { axis: 'x', sign: -1 },
                { axis: 'x', sign: 1 },
                { axis: 'z', sign: -1 },
                { axis: 'z', sign: 1 },
            ];

            for (const face of faceDefs) {
                for (let i = 0; i < charsOnEdge; i++) {
                    const pos = (i - charsOnEdge / 2 + 0.5) * spacing;

                    for (let h = 1; h <= maxH; h += floorSkip) {
                        if (Math.random() < 0.12) continue; // organic gaps

                        const ch = randChar();
                        const charIdx = charToIndex.get(ch);
                        if (charIdx < 0) continue;

                        const bright = glyphBrightness(face.sign, h, maxH);

                        let px, pz;
                        if (face.axis === 'x') {
                            px = bx + pos;
                            pz = bz + face.sign * hw;
                        } else {
                            px = bx + face.sign * hw;
                            pz = bz + pos;
                        }

                        pushGlyph(positions, charIndices, brightFlags, px, h * 0.32, pz, charIdx, bright);
                    }
                }
            }
        }

        function addRoofChars(positions, charIndices, brightFlags, bx, bz, maxH, dist) {
            const hw = BUILDING_WIDTH / 2;
            const spacing = charSpacingForDist(dist);
            const roofY = maxH * 0.32;
            const charsOnEdge = Math.floor((hw * 2) / spacing);

            for (let i = 0; i < charsOnEdge; i++) {
                const pos = (i - charsOnEdge / 2 + 0.5) * spacing;

                // Two edges parallel to z-axis (varying x, fixed z at ±hw)
                for (const sign of [-1, 1]) {
                    const ch = randChar();
                    const charIdx = charToIndex.get(ch);
                    if (charIdx < 0) continue;

                    pushGlyph(positions, charIndices, brightFlags, bx + pos, roofY, bz + sign * hw, charIdx, 1.0);
                }

                // Two edges parallel to x-axis (fixed x at ±hw, varying z)
                for (const sign of [-1, 1]) {
                    const ch = randChar();
                    const charIdx = charToIndex.get(ch);
                    if (charIdx < 0) continue;

                    pushGlyph(positions, charIndices, brightFlags, bx + sign * hw, roofY, bz + pos, charIdx, 1.0);
                }
            }
        }

        function computeUVOffsets(charIndices, totalChars) {
            const uvOffsets = new Float32Array(totalChars * 2);
            for (let i = 0; i < totalChars; i++) {
                const charIdx = charIndices[i];
                uvOffsets[i * 2]     = (charIdx % ATLAS_COLS) / ATLAS_COLS;
                uvOffsets[i * 2 + 1] = Math.floor(charIdx / ATLAS_ROWS) / ATLAS_ROWS;
            }
            return uvOffsets;
        }

        function createMatrixShaderMaterial() {
            return new THREE.ShaderMaterial({
                uniforms: {
                    uAtlas: { value: atlasTex },
                    uTime:  { value: 0 }
                },
                vertexShader: `
                    attribute vec3 instancePosition;
                    attribute vec2 instanceScale;
                    attribute vec2 instanceUVOffset;
                    attribute float instanceBright;
                    attribute float instanceAlpha;

                    varying vec2 vUv;
                    varying float vBright;
                    varying float vAlpha;

                    void main() {
                        vec3 right = vec3(viewMatrix[0][0], viewMatrix[1][0], viewMatrix[2][0]);
                        vec3 up    = vec3(viewMatrix[0][1], viewMatrix[1][1], viewMatrix[2][1]);

                        vec3 worldPos = instancePosition
                            + (position.x * instanceScale.x) * right
                            + (position.y * instanceScale.y) * up;

                        vUv     = uv * vec2(1.0/${ATLAS_COLS}.0, 1.0/${ATLAS_ROWS}.0) + instanceUVOffset;
                        vBright = instanceBright;
                        vAlpha  = instanceAlpha;

                        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D uAtlas;
                    uniform float uTime;
                    varying vec2 vUv;
                    varying float vBright;
                    varying float vAlpha;

                    void main() {
                        vec4 texel = texture(uAtlas, vUv);

                        float charAlpha = max(texel.r, max(texel.g, texel.b));
                        float scanline = 0.85 + 0.15 * sin(vUv.y * 150.0 + uTime * 5.0);
                        float flicker  = 0.92 + 0.08 * sin(uTime * 3.0 + vUv.x * 50.0);

                        vec3 col = texel.rgb * vBright;

                        float finalAlpha = charAlpha * vBright * vAlpha * scanline * flicker;
                        if (finalAlpha < 0.01) discard;

                        gl_FragColor = vec4(col, finalAlpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
            });
        }

        function buildInstancedMesh(positions, charIndices, brightFlags) {
            const totalChars = positions.length / 3;

            // Pack position & scale arrays for instanced attributes
            const instancePositions = new Float32Array(totalChars * 3);
            const instanceScales    = new Float32Array(totalChars * 2);
            for (let i = 0; i < totalChars; i++) {
                instancePositions[i * 3]     = positions[i * 3];
                instancePositions[i * 3 + 1] = positions[i * 3 + 1];
                instancePositions[i * 3 + 2] = positions[i * 3 + 2];
                instanceScales[i * 2]        = 0.45;
                instanceScales[i * 2 + 1]    = 0.38;
            }

            const uvOffsets = computeUVOffsets(charIndices, totalChars);

            const geo = new THREE.PlaneGeometry(1, 1);
            const mat = createMatrixShaderMaterial();

            const mesh = new THREE.InstancedMesh(geo, mat, totalChars);
            mesh.frustumCulled = false;

            // Attach custom instanced attributes
            mesh.geometry.setAttribute('instancePosition',
                new THREE.InstancedBufferAttribute(instancePositions, 3));
            mesh.geometry.setAttribute('instanceScale',
                new THREE.InstancedBufferAttribute(instanceScales, 2));
            mesh.geometry.setAttribute('instanceUVOffset',
                new THREE.InstancedBufferAttribute(uvOffsets, 2));
            mesh.geometry.setAttribute('instanceBright',
                new THREE.InstancedBufferAttribute(new Float32Array(brightFlags), 1));

            const alphas = new Float32Array(totalChars).fill(1.0);
            mesh.geometry.setAttribute('instanceAlpha',
                new THREE.InstancedBufferAttribute(alphas, 1));

            // Identity matrices for all instances (position is in custom attribute)
            const dummy = new THREE.Object3D();
            for (let i = 0; i < totalChars; i++) {
                dummy.position.set(0, 0, 0);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }

            mesh.instanceMatrix.needsUpdate = true;

            // Runtime animation data (overwrites any prior userData)
            mesh.userData = {
                uvOffsets,
                scales: instanceScales,
                alphas,
                charIndices: new Uint16Array(charIndices),
                refreshRates: new Float32Array(totalChars).map(() => 0.8 + Math.random() * 2.5),
                nextRefresh: new Float32Array(totalChars).fill(0),
                lastRefreshTime: new Float32Array(totalChars).fill(0),
                decayRates: new Float32Array(totalChars).map(() => 1.5 + Math.random() * 3.0),
            };

            return mesh;
        }

        function createVehicle() {
            const r = Math.random();
            const vColor = r > 0.7 ? 0x44ffdd : (r > 0.5 ? 0xffaa33 : 0x55ff77);

            const vMat = new THREE.MeshBasicMaterial({
                color: vColor, transparent: true, opacity: 0.6,
            });
            const vGeo = new THREE.SphereGeometry(0.12, 4, 3);
            const vehicle = new THREE.Mesh(vGeo, vMat);

            // Pick a random avenue to fly along
            const axis = Math.random() > 0.5 ? 'x' : 'z';
            const roadIdx = Math.floor((Math.random() * 2 - 1) * (GRID / 2));
            const roadPos = roadIdx * 2 * CELL;

            vehicle.position.set(
                axis === 'x' ? (Math.random() - 0.5) * GRID * CELL : roadPos,
                8 + Math.random() * 30,
                axis === 'z' ? (Math.random() - 0.5) * GRID * CELL : roadPos
            );

            vehicle.userData.flyAxis = axis;
            vehicle.userData.flySpeed = 3 + Math.random() * 5;
            vehicle.userData.flyDir   = Math.random() > 0.5 ? 1 : -1;
            vehicle.userData.flyY     = vehicle.position.y;

            // Trail behind the vehicle (opposite to direction of travel)
            const dir = -vehicle.userData.flyDir;
            const trailGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(axis === 'x' ? dir * 2 : 0, 0, axis === 'z' ? dir * 2 : 0),
            ]);
            const trailMat = new THREE.LineBasicMaterial({
                color: vColor, transparent: true, opacity: 0.2,
            });
            vehicle.add(new THREE.Line(trailGeo, trailMat));

            return vehicle;
        }

        // ── Main city builder ─────────────────────────────────────────

        // ── Geometry merging helper (avoids extra import) ───────────

        function mergeBufferGeometries(meshes) {
            const positions = [];
            const normals = [];
            const uvs = [];
            const indices = [];
            let indexOffset = 0;

            function processMesh(geo, px, py, pz) {
                geo.translate(px, py, pz);

                const posAttr = geo.getAttribute('position');
                const normAttr = geo.getAttribute('normal');
                const uvAttr = geo.getAttribute('uv');

                for (let i = 0; i < posAttr.count; i++) {
                    positions.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
                    if (normAttr) normals.push(normAttr.getX(i), normAttr.getY(i), normAttr.getZ(i));
                    if (uvAttr) uvs.push(uvAttr.getX(i), uvAttr.getY(i));
                }

                if (geo.index) {
                    for (let i = 0; i < geo.index.count; i++) {
                        indices.push(geo.index.array[i] + indexOffset);
                    }
                } else {
                    for (let i = 0; i < posAttr.count; i++) {
                        indices.push(i + indexOffset);
                    }
                }

                indexOffset += posAttr.count;
            }

            for (const obj of meshes) {
                if (obj.isGroup) {
                    // Group: process each child with parent offset
                    for (const child of obj.children) {
                        const geo = child.geometry.clone();
                        processMesh(geo,
                            obj.position.x + child.position.x,
                            obj.position.y + child.position.y,
                            obj.position.z + child.position.z
                        );
                    }
                } else {
                    // Plain mesh
                    const geo = obj.geometry.clone();
                    processMesh(geo, obj.position.x, obj.position.y, obj.position.z);
                }
            }

            const merged = new THREE.BufferGeometry();
            merged.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            if (normals.length) merged.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            if (uvs.length) merged.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            merged.setIndex(indices);

            return merged;
        }

        // ── Building geometry detail helpers ────────────────────────

        function createBuildingBox(bx, bz, maxH) {
            const hw = BUILDING_WIDTH / 2;
            const h = maxH * 0.32;

            // Main box + horizontal ledges at intervals for architectural detail
            const group = new THREE.Group();

            // Main building body (slightly inset from full width to leave room for ledges)
            const bodyW = BUILDING_WIDTH - 0.1;
            const bodyGeo = new THREE.BoxGeometry(bodyW, h, bodyW);
            group.add(new THREE.Mesh(bodyGeo));

            // Horizontal ledges every few floors — positioned in local coords (-h/2 to +h/2)
            const ledgeCount = Math.max(1, Math.floor(maxH / 6));
            for (let l = 0; l < ledgeCount; l++) {
                // Distribute evenly within building bounds, inset from top/bottom edges
                const ledgeY = ((l + 1) / (ledgeCount + 1)) * h - h / 2;
                const ledgeW = BUILDING_WIDTH + 0.2;
                const ledgeGeo = new THREE.BoxGeometry(ledgeW, 0.08, ledgeW);
                const ledge = new THREE.Mesh(ledgeGeo);
                ledge.position.y = ledgeY;
                group.add(ledge);
            }

            // Top cornice (wider ledge at roof) — top edge flush with building top
            const corniceW = BUILDING_WIDTH + 0.3;
            const corniceGeo = new THREE.BoxGeometry(corniceW, 0.12, corniceW);
            const cornice = new THREE.Mesh(corniceGeo);
            cornice.position.y = h / 2 - 0.06; // center so top edge sits at +h/2
            group.add(cornice);

            // Vertical pipes/conduits on random edges
            const pipeCount = Math.floor(Math.random() * 3);
            for (let p = 0; p < pipeCount; p++) {
                const faceIdx = Math.floor(Math.random() * 4);
                const pipeGeo = new THREE.CylinderGeometry(0.04, 0.05, h * (0.6 + Math.random() * 0.4), 6);
                const pipe = new THREE.Mesh(pipeGeo);

                // Position along building edge
                const edgePos = (Math.random() - 0.5) * BUILDING_WIDTH * 0.7;
                const offset = hw + 0.06;

                if (faceIdx === 0) {
                    pipe.position.set(edgePos, h * 0.1, offset);
                } else if (faceIdx === 1) {
                    pipe.position.set(edgePos, h * 0.1, -offset);
                } else if (faceIdx === 2) {
                    pipe.position.set(offset, h * 0.1, edgePos);
                } else {
                    pipe.position.set(-offset, h * 0.1, edgePos);
                }

                group.add(pipe);
            }

            group.position.set(bx, h / 2, bz);
            return group;
        }

        function addWindowGrid(bx, bz, maxH) {
            const hw = BUILDING_WIDTH / 2;
            const buildingH = maxH * 0.32;
            const winW = 0.45, winH = 0.35;
            const gapX = 1.0, gapY = 0.95;

            // Collect window positions per face for instancing
            const winPositions = [];
            const winBrights = [];
            const winFaceRotations = []; // Y rotation per window so each faces outward

            const faceDefs = [
                { axis: 'x', sign: 1, rotY: 0 },
                { axis: 'x', sign: -1, rotY: Math.PI },
                { axis: 'z', sign: 1, rotY: Math.PI / 2 },
                { axis: 'z', sign: -1, rotY: -Math.PI / 2 },
            ];

            for (const face of faceDefs) {
                const cols = Math.floor((BUILDING_WIDTH - 0.6) / gapX);
                const rows = Math.floor((buildingH - 1.0) / gapY);

                for (let c = 0; c < cols; c++) {
                    const localX = (c - cols / 2 + 0.5) * gapX;
                    for (let r = 0; r < rows; r++) {
                        const localY = 0.6 + r * gapY;

                        // Randomly skip windows for organic look — ~85% dark
                        if (Math.random() > 0.15) continue;

                        let px, pz;
                        if (face.axis === 'x') {
                            px = bx + localX;
                            pz = bz + face.sign * (hw + 0.01);
                        } else {
                            px = bx + face.sign * (hw + 0.01);
                            pz = bz + localX;
                        }

                        winPositions.push(px, localY, pz);
                        // Brightness: some windows are warm amber, most green
                        const isWarm = Math.random() > 0.85;
                        winBrights.push(isWarm ? 2.0 : 1.0);
                        winFaceRotations.push(face.rotY);
                    }
                }
            }

            if (winPositions.length === 0) return null;

            const count = winPositions.length / 3;
            const geo = new THREE.PlaneGeometry(winW, winH);
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                },
                vertexShader: `
                    attribute float instanceBright;
                    attribute float instancePhase;
                    attribute float instanceFreq;
                    varying float vBright;
                    varying float vPhase;
                    varying float vFreq;
                    void main() {
                        vBright = instanceBright;
                        vPhase = instancePhase;
                        vFreq = instanceFreq;
                        vec4 worldPos = instanceMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * viewMatrix * worldPos;
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying float vBright;
                    varying float vPhase;
                    varying float vFreq;
                    void main() {
                        vec3 green = vec3(0.0, 0.9, 0.25);
                        vec3 amber = vec3(1.0, 0.6, 0.1);
                        vec3 col = vBright > 1.5 ? amber : green;

                        float flicker = 0.8 + 0.2 * sin(uTime * vFreq + vPhase);
                        float alpha = 0.5 * flicker;

                        gl_FragColor = vec4(col, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            const mesh = new THREE.InstancedMesh(geo, mat, count);
            const dummy = new THREE.Object3D();
            for (let i = 0; i < count; i++) {
                dummy.position.set(
                    winPositions[i * 3],
                    winPositions[i * 3 + 1],
                    winPositions[i * 3 + 2]
                );
                dummy.rotation.set(0, winFaceRotations[i], 0);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;
            mesh.geometry.setAttribute('instanceBright',
                new THREE.InstancedBufferAttribute(new Float32Array(winBrights), 1));
            mesh.geometry.setAttribute('instancePhase',
                new THREE.InstancedBufferAttribute(new Float32Array(count).map(() => Math.random() * Math.PI * 2), 1));
            mesh.geometry.setAttribute('instanceFreq',
                new THREE.InstancedBufferAttribute(new Float32Array(count).map(() => 0.5 + Math.random() * 4.0), 1));

            return mesh;
        }

        function addDoors(bx, bz) {
            const hw = BUILDING_WIDTH / 2;
            const doorW = 0.8, doorH = 1.4;

            // Pick one or two random faces for doors
            const faceCount = Math.random() > 0.5 ? 1 : 2;
            const faces = [
                { axis: 'x', sign: 1, rotY: 0 },
                { axis: 'z', sign: 1, rotY: Math.PI / 2 },
            ];

            const group = new THREE.Group();

            for (let f = 0; f < faceCount; f++) {
                const face = faces[f % faces.length];
                let px, pz;
                if (face.axis === 'x') {
                    px = bx + (Math.random() - 0.5) * BUILDING_WIDTH * 0.6;
                    pz = bz + face.sign * (hw + 0.02);
                } else {
                    px = bx + face.sign * (hw + 0.02);
                    pz = bz + (Math.random() - 0.5) * BUILDING_WIDTH * 0.6;
                }

                // Door frame (emissive border)
                const frameGeo = new THREE.PlaneGeometry(doorW + 0.15, doorH + 0.1);
                const frameMat = new THREE.MeshBasicMaterial({
                    color: 0x00ff41,
                    transparent: true,
                    opacity: 0.35,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                frame.position.set(px, doorH / 2, pz);
                frame.rotation.y = face.rotY;

                // Inner dark panel
                const innerGeo = new THREE.PlaneGeometry(doorW - 0.1, doorH - 0.1);
                const innerMat = new THREE.MeshBasicMaterial({
                    color: 0x001a05,
                    side: THREE.DoubleSide,
                });
                const inner = new THREE.Mesh(innerGeo, innerMat);
                inner.position.set(px, doorH / 2, pz + (face.sign * -0.005));
                inner.rotation.y = face.rotY;

                group.add(frame);
                group.add(inner);
            }

            return group;
        }

        function addAntenna(bx, bz, maxH) {
            const hw = BUILDING_WIDTH / 2;
            const roofY = maxH * 0.32;

            // Random position on roof
            const ax = bx + (Math.random() - 0.5) * BUILDING_WIDTH * 0.6;
            const az = bz + (Math.random() - 0.5) * BUILDING_WIDTH * 0.6;

            const group = new THREE.Group();

            // Pole
            const poleH = 2 + Math.random() * 4;
            const poleGeo = new THREE.CylinderGeometry(0.03, 0.04, poleH, 6);
            const poleMat = new THREE.MeshStandardMaterial({
                color: 0x1a2a1a,
                roughness: 0.6,
                metalness: 0.7,
            });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(ax, roofY + poleH / 2, az);
            group.add(pole);

            // Blinking light at top
            const lightGeo = new THREE.SphereGeometry(0.08, 6, 4);
            const lightMat = new THREE.MeshBasicMaterial({
                color: Math.random() > 0.5 ? 0xff2200 : 0x00ff41,
                transparent: true,
                opacity: 0.9,
            });
            const light = new THREE.Mesh(lightGeo, lightMat);
            light.position.set(ax, roofY + poleH + 0.08, az);
            light.userData.blinkSpeed = 1 + Math.random() * 3;
            light.userData.blinkPhase = Math.random() * Math.PI * 2;
            group.add(light);

            // Sometimes add a second shorter antenna nearby
            if (Math.random() > 0.5) {
                const ax2 = ax + (Math.random() - 0.5) * 1.5;
                const az2 = az + (Math.random() - 0.5) * 1.5;
                const poleH2 = 1 + Math.random() * 2;
                const pole2Geo = new THREE.CylinderGeometry(0.02, 0.03, poleH2, 6);
                const pole2 = new THREE.Mesh(pole2Geo, poleMat.clone());
                pole2.position.set(ax2, roofY + poleH2 / 2, az2);
                group.add(pole2);

                const light2 = new THREE.Mesh(lightGeo.clone(), lightMat.clone());
                light2.position.set(ax2, roofY + poleH2 + 0.06, az2);
                light2.userData.blinkSpeed = 1 + Math.random() * 3;
                light2.userData.blinkPhase = Math.random() * Math.PI * 2;
                group.add(light2);
            }

            return group;
        }

        function addSatelliteDish(bx, bz, maxH) {
            const hw = BUILDING_WIDTH / 2;
            const roofY = maxH * 0.32;

            const dx = bx + (Math.random() - 0.5) * BUILDING_WIDTH * 0.5;
            const dz = bz + (Math.random() - 0.5) * BUILDING_WIDTH * 0.5;

            const group = new THREE.Group();

            // Dish base (cone shape)
            const dishR = 0.3 + Math.random() * 0.25;
            const dishH = dishR * 0.6;
            const dishGeo = new THREE.ConeGeometry(dishR, dishH, 12, 1, true);
            const dishMat = new THREE.MeshStandardMaterial({
                color: 0x1a2a1a,
                roughness: 0.5,
                metalness: 0.8,
                side: THREE.DoubleSide,
            });
            const dish = new THREE.Mesh(dishGeo, dishMat);

            // Tilt the dish upward at a random angle
            const tiltX = (Math.random() - 0.5) * 0.8;
            const tiltZ = (Math.random() - 0.5) * 0.8;
            dish.rotation.set(tiltX, Math.random() * Math.PI * 2, tiltZ);
            dish.position.set(dx, roofY + dishH / 2 - 0.1, dz);
            group.add(dish);

            // Feed horn (small sphere at dish focus)
            const feedGeo = new THREE.SphereGeometry(0.05, 6, 4);
            const feedMat = new THREE.MeshBasicMaterial({
                color: 0x00ff41,
                transparent: true,
                opacity: 0.5,
            });
            const feed = new THREE.Mesh(feedGeo, feedMat);
            // Position at approximate focal point
            const offset = dishR * 0.3;
            feed.position.set(
                dx + Math.sin(tiltX) * offset,
                roofY + dishH - 0.15 + Math.cos(tiltX) * offset * 0.3,
                dz + Math.sin(tiltZ) * offset
            );
            group.add(feed);

            // Support pole
            const poleGeo = new THREE.CylinderGeometry(0.025, 0.03, dishH * 1.2, 6);
            const poleMat = new THREE.MeshStandardMaterial({
                color: 0x1a2a1a,
                roughness: 0.6,
                metalness: 0.7,
            });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(dx, roofY + dishH * 0.5 - 0.1, dz);
            group.add(pole);

            return group;
        }

        function addRoofDetails(bx, bz, maxH) {
            const group = new THREE.Group();

            // AC unit / box on roof
            if (Math.random() > 0.4) {
                const acW = 0.6 + Math.random() * 0.5;
                const acD = 0.4 + Math.random() * 0.3;
                const acH = 0.5 + Math.random() * 0.4;
                const roofY = maxH * 0.32;
                const acGeo = new THREE.BoxGeometry(acW, acH, acD);
                const acMat = new THREE.MeshStandardMaterial({
                    color: 0x0a150a,
                    roughness: 0.7,
                    metalness: 0.5,
                });
                const ac = new THREE.Mesh(acGeo, acMat);
                ac.position.set(
                    bx + (Math.random() - 0.5) * BUILDING_WIDTH * 0.4,
                    roofY + acH / 2,
                    bz + (Math.random() - 0.5) * BUILDING_WIDTH * 0.4
                );
                group.add(ac);
            }

            // Water tower on some taller buildings
            if (maxH > 20 && Math.random() > 0.7) {
                const roofY = maxH * 0.32;
                const towerX = bx + (Math.random() - 0.5) * BUILDING_WIDTH * 0.3;
                const towerZ = bz + (Math.random() - 0.5) * BUILDING_WIDTH * 0.3;

                // Legs
                const legH = 2 + Math.random();
                for (const [lx, lz] of [[-0.3, -0.3], [0.3, -0.3], [-0.3, 0.3], [0.3, 0.3]]) {
                    const legGeo = new THREE.CylinderGeometry(0.02, 0.03, legH, 4);
                    const legMat = new THREE.MeshStandardMaterial({ color: 0x1a2a1a, metalness: 0.7 });
                    const leg = new THREE.Mesh(legGeo, legMat);
                    leg.position.set(towerX + lx, roofY + legH / 2, towerZ + lz);
                    group.add(leg);
                }

                // Tank
                const tankGeo = new THREE.CylinderGeometry(0.5, 0.6, 1.2, 8);
                const tankMat = new THREE.MeshStandardMaterial({
                    color: 0x0a150a,
                    roughness: 0.6,
                    metalness: 0.5,
                });
                const tank = new THREE.Mesh(tankGeo, tankMat);
                tank.position.set(towerX, roofY + legH + 0.6, towerZ);
                group.add(tank);
            }

            return group;
        }

        // ── Main city builder ─────────────────────────────────────────
        function buildCity() {
            const half = Math.floor(GRID / 2);

            const positions   = [];
            const charIndices = [];
            const brightFlags = [];

            // Collect detail groups for merging
            const buildingMeshes = [];
            const windowMeshes = [];
            const antennaGroups = [];

            // ── Place buildings on the grid ───────────────────────────
            for (let gx = -half; gx <= half; gx++) {
                for (let gz = -half; gz <= half; gz++) {
                    // Skip road cells — buildings only on odd grid positions
                    if (isRoadCell(gx, gz)) continue;

                    const dist = Math.sqrt(gx * gx + gz * gz);
                    const maxH = calcBuildingHeight(gx, gz);

                    const bx = gx * CELL;
                    const bz = gz * CELL;
                    buildingHeights.push({ x: bx, z: bz, h: maxH });

                    // Randomly leave blocks empty for plazas — denser near center
                    if (Math.random() > fillChance(dist)) continue;

                    // ── Building geometry details ─────────────────────
                    buildingMeshes.push(createBuildingBox(bx, bz, maxH));

                    const windows = addWindowGrid(bx, bz, maxH);
                    if (windows) windowMeshes.push(windows);

                    // Doors on ~40% of buildings
                    if (Math.random() > 0.6) {
                        scene.add(addDoors(bx, bz));
                    }

                    // Antennas on ~35% of buildings, more likely on taller ones
                    if (Math.random() > (0.5 - maxH * 0.01)) {
                        antennaGroups.push(addAntenna(bx, bz, maxH));
                    }

                    // Satellite dishes on ~15% of buildings, more likely near center
                    if (Math.random() > (0.7 + dist * 0.02)) {
                        scene.add(addSatelliteDish(bx, bz, maxH));
                    }

                    // Roof details (AC units, water towers)
                    scene.add(addRoofDetails(bx, bz, maxH));

                    addWallChars(positions, charIndices, brightFlags, bx, bz, maxH, dist);
                    addRoofChars(positions, charIndices, brightFlags, bx, bz, maxH, dist);
                }
            }

            // ── Merge building boxes into single mesh for performance ─
            if (buildingMeshes.length > 0) {
                const mergedGeo = mergeBufferGeometries(buildingMeshes);
                const buildingMat = new THREE.MeshStandardMaterial({
                    color: 0x050a06,
                    roughness: 0.85,
                    metalness: 0.3,
                });
                const buildingGroup = new THREE.Mesh(mergedGeo, buildingMat);
                scene.add(buildingGroup);
            }

            // ── Build the instanced character mesh ────────────────────
            const mesh = buildInstancedMesh(positions, charIndices, brightFlags);
            scene.add(mesh);
            window._matrixInstancedMesh = mesh;

            // ── Add window meshes to scene ────────────────────────────
            for (const wm of windowMeshes) {
                scene.add(wm);
            }

            // ── Add antenna groups to scene ───────────────────────────
            for (const ag of antennaGroups) {
                scene.add(ag);
            }

            // ── Store references for animation ────────────────────────
            window._windowMeshes = windowMeshes;
            window._antennaGroups = antennaGroups;

            // ── Add flying vehicles with light trails ─────────────────
            for (let i = 0; i < 20; i++) {
                scene.add(createVehicle());
            }
            window._vehicles = scene.children.filter(c => c.userData.flyAxis !== undefined);
        }


        function buildGroundGrid() {
            const size = GRID * CELL;


            // Simplified ground grid — sparse, subtle lines only
            const groundGeo = new THREE.PlaneGeometry(size * 2.5, size * 2.5);
            const groundMat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0x00ff41) },
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec3 uColor;
                    varying vec2 vUv;

                    void main() {
                        // Sparse grid — only major lines every ~20 cells worth of UV
                        vec2 grid = abs(fract(vUv * 20.0 - 0.5) - 0.5);
                        float line = min(grid.x, grid.y);
                        float gridAlpha = 1.0 - smoothstep(0.0, 0.04, line);

                        // Subtle animated pulse along grid lines
                        float stream = abs(fract(vUv.x * 5.0 + uTime * 0.3) - 0.5);
                        float streamAlpha = (1.0 - smoothstep(0.0, 0.08, stream)) * 0.3;

                        float dist = distance(vUv, vec2(0.5));
                        float fade = 1.0 - smoothstep(0.2, 0.5, dist);

                        float totalAlpha = (gridAlpha * fade + streamAlpha) * 0.25;
                        gl_FragColor = vec4(uColor, totalAlpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide
            });
            const groundPlane = new THREE.Mesh(groundGeo, groundMat);
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = 0.01;
            scene.add(groundPlane);


            window._groundPlane = groundPlane;


            // Draw road edges at every even grid line (roads on the grid lines)
            const isRoad = (i) => i % 2 === 0;
            const avenueEdgeMat = new THREE.LineBasicMaterial({ color: 0x22ff66, transparent: true, opacity: 0.3 });

            for (let i = -GRID; i <= GRID; i++) {
                if (!isRoad(i)) continue;
                const pos = i * CELL;

                for (const sign of [-1, 1]) {
                    const zOff = pos + sign * CELL * 0.42;
                    scene.add(new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(-size, 0.04, zOff),
                            new THREE.Vector3(size, 0.04, zOff),
                        ]), avenueEdgeMat
                    ));
                }

                for (const sign of [-1, 1]) {
                    const xOff = pos + sign * CELL * 0.42;
                    scene.add(new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(xOff, 0.04, -size),
                            new THREE.Vector3(xOff, 0.04, size),
                        ]), avenueEdgeMat
                    ));
                }
            }


            // Sparse data stream chars along avenues only — reduced count and opacity
            const streamChars = 150;
            for (let i = 0; i < streamChars; i++) {
                const ch = randChar();
                const tex = getCharTex(ch, { bright: Math.random() > 0.7, size: 50 });
                const mat = new THREE.SpriteMaterial({
                    map: tex, transparent: true, opacity: 0.25 + Math.random() * 0.15,
                    depthWrite: false
                });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(0.5, 0.6, 1);

                const roadIdx = Math.floor((Math.random() * 2 - 1) * ((GRID / 2) | 0));
                const roadPos = roadIdx * 2 * CELL;

                if (Math.random() > 0.5) {
                    sprite.position.set((Math.random() - 0.5) * size * 2, 0.1, roadPos);
                } else {
                    sprite.position.set(roadPos, 0.1, (Math.random() - 0.5) * size * 2);
                }

                sprite.userData.streamSpeed = 0.5 + Math.random() * 1.5;
                sprite.userData.streamDir = Math.random() > 0.5 ? 1 : -1;
                sprite.userData.streamAxis = Math.random() > 0.5 ? 'x' : 'z';
                scene.add(sprite);
            }


            window._streamSprites = scene.children.filter(c => c.userData.streamSpeed);
        }


        function buildRain() {
            const count = 6000;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                positions[i * 3]     = (Math.random() - 0.5) * GRID * CELL * 4;
                positions[i * 3 + 1] = Math.random() * 150;
                positions[i * 3 + 2] = (Math.random() - 0.5) * GRID * CELL * 4;
                velocities[i] = 0.8 + Math.random() * 1.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('velocity', new THREE.BufferAttribute(velocities, 1));

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0x00ff41) }
                },
                vertexShader: `
                    attribute float velocity;
                    varying float vAlpha;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = (120.0 / -mvPosition.z) * velocity;
                        gl_Position = projectionMatrix * mvPosition;
                        vAlpha = smoothstep(120.0, 20.0, -mvPosition.z);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vAlpha;
                    void main() {
                        // Create a vertical streak shape for digital rain effect
                        vec2 center = gl_PointCoord - 0.5;
                        float dist = abs(center.x);
                        // Sharper, longer streaks with trailing fade
                        float streak = smoothstep(0.45, 0.1, dist) * (1.0 - abs(center.y));
                        float trail = smoothstep(0.5, 0.0, center.y) * 0.6;
                        float alpha = (streak + trail) * vAlpha * 0.2;
                        if (alpha < 0.01) discard;

                        // Brighter core, softer edges
                        vec3 col = mix(uColor * 0.4, uColor * 1.0, streak);
                        gl_FragColor = vec4(col, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            const rain = new THREE.Points(geo, mat);
            scene.add(rain);
            window._rain = rain;
        }


        function buildHazeLayers() {
            for (let layer = 0; layer < 3; layer++) {
                const hazeGeo = new THREE.PlaneGeometry(GRID * CELL * 3, GRID * CELL * 3);
                const hazeMat = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uLayer: { value: layer },
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float uTime;
                        uniform float uLayer;
                        varying vec2 vUv;

                        // Simplex-like noise
                        float hash(vec2 p) {
                            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                        }
                        float noise(vec2 p) {
                            vec2 i = floor(p);
                            vec2 f = fract(p);
                            f = f * f * (3.0 - 2.0 * f);
                            return mix(
                                mix(hash(i), hash(i + vec2(1,0)), f.x),
                                mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
                                f.y
                            );
                        }

                        void main() {
                            vec2 uv = vUv * 3.0;
                            float n = noise(uv + uTime * (0.1 + uLayer * 0.05));
                            float n2 = noise(uv * 2.0 - uTime * (0.15 + uLayer * 0.03));
                            float haze = n * n2;

                            vec2 centerDist = abs(vUv - 0.5) * 2.0;
                            float fade = 1.0 - smoothstep(0.3, 0.7, max(centerDist.x, centerDist.y));

                            float alpha = haze * fade * (0.015 + uLayer * 0.008);
                            vec3 col = mix(vec3(0.0, 0.8, 0.2), vec3(0.15, 0.9, 0.6), n);
                            gl_FragColor = vec4(col, alpha);
                        }
                    `,
                    transparent: true,
                    depthWrite: false,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                });
                const haze = new THREE.Mesh(hazeGeo, hazeMat);
                haze.position.y = 5 + layer * 12;
                scene.add(haze);
            }
            window._hazeLayers = scene.children.filter(c => c.material && c.material.uniforms && c.material.uniforms.uLayer);
        }

        function buildStarfield() {
            const count = 800;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random());
                const r = 150 + Math.random() * 100;
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.cos(phi) * 0.5 + 20;
                positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

                const isGreen = Math.random() > 0.3;
                colors[i * 3] = isGreen ? 0.1 : 0.5;
                colors[i * 3 + 1] = isGreen ? 0.8 : 0.5;
                colors[i * 3 + 2] = isGreen ? 0.2 : 0.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            const stars = new THREE.Points(geo, mat);
            scene.add(stars);
        }

        function buildLightBeams() {
            const beamGeo = new THREE.CylinderGeometry(0.08, 0.6, 100, 8, 1, true);
            const beamMat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0x00ff41) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec3 uColor;
                    varying vec2 vUv;
                    void main() {
                        float alpha = (1.0 - vUv.y) * 0.08;
                        // Volumetric light falloff from center
                        float radial = 1.0 - abs(vUv.x - 0.5) * 2.0;
                        radial = smoothstep(0.0, 1.0, radial);

                        float pulse = 0.7 + 0.3 * sin(uTime * 2.0 + vUv.y * 10.0);
                        float flicker = 0.85 + 0.15 * sin(uTime * 7.0 + vUv.y * 20.0);

                        alpha *= radial * pulse * flicker;
                        gl_FragColor = vec4(uColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });

            const isAvenue = (i) => Math.abs(i) % 6 === 0;
            const beams = [];

            for (let ix = -GRID; ix <= GRID; ix++) {
                for (let iz = -GRID; iz <= GRID; iz++) {
                    if (isAvenue(ix) && isAvenue(iz)) {
                        // Only place a beam ~40% of the time for sparser distribution
                        if (Math.random() > 0.4) continue;
                        const mat = beamMat.clone();
                        mat.uniforms.uTime.value = Math.random() * 10;
                        const beam = new THREE.Mesh(beamGeo, mat);
                        beam.position.set(ix * CELL, 35, iz * CELL);
                        scene.add(beam);
                        beams.push(beam);
                    }
                }
            }
            window._lightBeams = beams;
        }

        function startDroneFlythrough() {
            const waypoints = [];

            // Road centers are at even grid positions * CELL.
            // By snapping every waypoint to a road center, the drone
            // always stays centered on streets and never clips buildings.
            const half = Math.floor(GRID / 2);
            const roadCenter = (idx) => idx * CELL; // idx is even: -8,-6,...,8

            // Helper: add a straight segment along one road axis.
            // `fixedAxis` is the locked axis ('x' or 'z'),
            // `fixedIdx` is its even grid index, `v` varies along the other axis.
            // Uses a continuous cumulative counter so height never jumps between segments.
            let segIdx = 0;
            function addSegment(fixedAxis, fixedIdx, varyStart, varyEnd, step) {
                for (let v = varyStart; step > 0 ? v <= varyEnd : v >= varyEnd; v += step) {
                    // Height oscillates smoothly along the full path (min 5, max ~35)
                    const h = 5 + ((Math.sin(segIdx * 0.3) + 1) / 2) * 30;
                    segIdx++;
                    if (fixedAxis === 'x') {
                        waypoints.push(new THREE.Vector3(roadCenter(fixedIdx), h, roadCenter(v)));
                    } else {
                        waypoints.push(new THREE.Vector3(roadCenter(v), h, roadCenter(fixedIdx)));
                    }
                }
            }

            // ── Path: outer rectangle with inner detour through center ──

            // 1. North along x=0 road (z: -6 → 4)
            addSegment('x', 0, -6, 4, 2);
            // 2. East along z=4 road (x: 0 → 6)
            addSegment('z', 4, 0, 6, 2);
            // 3. South along x=6 road (z: 4 → -6)
            addSegment('x', 6, 4, -6, -2);
            // 4. West along z=-6 road (x: 6 → -4)
            addSegment('z', -6, 6, -4, -2);
            // 5. North along x=-4 road (z: -6 → 0) — inner loop
            addSegment('x', -4, -6, 0, 2);
            // 6. East along z=0 road (x: -4 → 0) — through city center
            addSegment('z', 0, -4, 0, 2);
            // 7. South along x=0 road (z: 0 → -6) — back to start
            addSegment('x', 0, 0, -6, -2);

            const curve = new THREE.CatmullRomCurve3(waypoints, true);
            let t = 0;
            const baseSpeed = 0.00015;

            // Smoothed state — everything trails its ideal value for fluid motion
            const _posTarget = new THREE.Vector3();
            const _lookTarget = new THREE.Vector3();
            let smoothBank = 0;

            function fly() {
                t = (t + baseSpeed) % 1;

                // ── Position: lerp toward curve point (no snapping) ──
                _posTarget.copy(curve.getPointAt(t));
                camera.position.lerp(_posTarget, 0.1);

                // ── Look-ahead: lerp toward a point further along the curve ──
                const lookT = (t + 0.04) % 1;
                _lookTarget.lerp(curve.getPointAt(lookT), 0.08);
                // Tilt down only when flying above mid-range (height > 20)
                const midH = 20;
                if (camera.position.y > midH) {
                    const excess = camera.position.y - midH;
                    _lookTarget.y = camera.position.y - (excess * 0.6);
                } else {
                    _lookTarget.y = camera.position.y;
                }
                camera.lookAt(_lookTarget);

                // ── Banking: smooth the raw curvature value over time ──
                const p1 = curve.getPointAt(t);
                const p2 = curve.getPointAt((t + 0.01) % 1);
                const p3 = curve.getPointAt((t + 0.02) % 1);
                const v1 = new THREE.Vector3().subVectors(p2, p1).normalize();
                const v2 = new THREE.Vector3().subVectors(p3, p2).normalize();
                const cross = new THREE.Vector3().crossVectors(v1, v2);

                let rawBank = cross.y * 0.5;
                rawBank = Math.max(-0.3, Math.min(0.3, rawBank));
                smoothBank += (rawBank - smoothBank) * 0.1;
                camera.rotateZ(smoothBank);

                requestAnimationFrame(fly);
            }
            fly();
        }


        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const t = clock.getElapsedTime();
            const mesh = window._matrixInstancedMesh;

            if (mesh) {
                const ud = mesh.userData;
                const alphas = ud.alphas;
                const scales = ud.scales;
                const uvOffsets = ud.uvOffsets;
                const charIndices = ud.charIndices;

                for (let i = 0; i < mesh.count; i++) {

                    if (t >= ud.nextRefresh[i]) {
                        const newCharIdx = Math.floor(Math.random() * CHARS.length);
                        charIndices[i] = newCharIdx;


                        const col = newCharIdx % ATLAS_COLS;
                        const row = Math.floor(newCharIdx / ATLAS_COLS);
                        uvOffsets[i * 2]       = col / ATLAS_COLS;
                        uvOffsets[i * 2 + 1]   = row / ATLAS_ROWS;


                        ud.nextRefresh[i] = t + ud.refreshRates[i];


                        alphas[i] = 1.0;
                        ud.lastRefreshTime[i] = t;
                    }


                    const i2 = i * 2;
                    if (alphas[i] > 0.01) {
                        const elapsed = t - ud.lastRefreshTime[i];
                        alphas[i] = Math.max(0.01, 1.0 - elapsed / ud.decayRates[i]);

                        const baseScaleX = 0.45;
                        const baseScaleY = 0.38;
                        scales[i2]     = baseScaleX;
                        scales[i2 + 1] = baseScaleY;
                    }
                }


                mesh.geometry.attributes.instanceUVOffset.needsUpdate = true;
                mesh.geometry.attributes.instanceScale.needsUpdate = true;
                mesh.geometry.attributes.instanceAlpha.needsUpdate = true;
                mesh.material.uniforms.uTime.value = t;
            }


            if (window._groundPlane) {
                window._groundPlane.material.uniforms.uTime.value = t;
            }

            if (window._rain) {
                window._rain.material.uniforms.uTime.value = t;
                const pos = window._rain.geometry.attributes.position;
                const vel = window._rain.geometry.attributes.velocity;
                for (let i = 0; i < pos.count; i++) {
                    let y = pos.array[i * 3 + 1];
                    y -= vel.array[i] * dt * 14;
                    if (y < -5) y = 120;
                    pos.array[i * 3 + 1] = y;
                }
                pos.needsUpdate = true;
            }

            if (window._lightBeams) {
                for (const beam of window._lightBeams) {
                    beam.material.uniforms.uTime.value = t;
                    // Subtle rotation and height pulse for dynamic atmosphere
                    beam.rotation.y += dt * 0.04;
                    beam.position.y = 40 + Math.sin(t * 0.3 + beam.id) * 2;
                }
            }

            // Animate haze layers
            if (window._hazeLayers) {
                for (const haze of window._hazeLayers) {
                    haze.material.uniforms.uTime.value = t;
                }
            }

            // Animate flying vehicles
            if (window._vehicles) {
                const citySize = GRID * CELL;
                for (const v of window._vehicles) {
                    const move = v.userData.flySpeed * v.userData.flyDir * dt;
                    if (v.userData.flyAxis === 'x') {
                        v.position.x += move;
                        if (Math.abs(v.position.x) > citySize) {
                            v.position.x = -Math.sign(v.position.x) * (citySize - 1);
                            v.userData.flyY = 8 + Math.random() * 30;
                        }
                    } else {
                        v.position.z += move;
                        if (Math.abs(v.position.z) > citySize) {
                            v.position.z = -Math.sign(v.position.z) * (citySize - 1);
                            v.userData.flyY = 8 + Math.random() * 30;
                        }
                    }
                    // Smooth altitude changes
                    v.position.y += (v.userData.flyY - v.position.y) * dt * 0.5;
                    // Subtle bob
                    v.position.y += Math.sin(t * 2 + v.id) * 0.01;
                }
            }


            const streams = window._streamSprites;
            if (streams) {
                const size = GRID * CELL;
                for (const s of streams) {
                    if (!s.userData.streamSpeed) continue;

                    const move = s.userData.streamSpeed * s.userData.streamDir * dt * 10;
                    if (s.userData.streamAxis === 'x') {
                        s.position.x += move;
                        if (Math.abs(s.position.x) > size) {
                            s.position.x = -Math.sign(s.position.x) * (size - 1);
                        }
                    } else {
                        s.position.z += move;
                        if (Math.abs(s.position.z) > size) {
                            s.position.z = -Math.sign(s.position.z) * (size - 1);
                        }
                    }


                    s.position.y = 0.06 + Math.sin(t * 2 + s.position.x * 0.15) * 0.02;
                    const pulse = Math.sin(t * 2 + s.position.x * 0.1);
                    s.material.opacity = 0.3 + pulse * 0.1;


                    if (Math.random() < 0.003) {
                        const ch = randChar();
                        s.material.map = getCharTex(ch, { bright: Math.random() > 0.6, size: 50 });
                    }
                }
            }

            // Animate window grid time uniforms
            if (window._windowMeshes) {
                for (const wm of window._windowMeshes) {
                    if (wm.material && wm.material.uniforms && wm.material.uniforms.uTime) {
                        wm.material.uniforms.uTime.value = t;
                    }
                }
            }

            // Animate antenna blink lights
            if (window._antennaGroups) {
                for (const group of window._antennaGroups) {
                    for (const child of group.children) {
                        if (child.userData.blinkSpeed !== undefined) {
                            const blink = Math.sin(t * child.userData.blinkSpeed + child.userData.blinkPhase);
                            child.material.opacity = blink > 0 ? 0.9 : 0.1;
                        }
                    }
                }
            }

            // Update camera-following light position
            if (window._camLight) {
                window._camLight.position.copy(camera.position);
            }

            composer.render();
        }


        function onResize() {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
        }


        try {
            init();
            animate();
        } catch (e) {
            const loading = document.getElementById('loading');
            loading.style.display = 'none';
            const errorEl = document.getElementById('error');
            errorEl.textContent = `ERROR: ${e.message}`;
            errorEl.style.display = 'block';
            console.error('Matrix City initialization failed:', e);
        }

    </script>

    <script>
        (() => {
            const MIN_W = 200, MIN_H = 150;

            document.querySelectorAll('.pip-container').forEach(container => {
                const header = container.querySelector('.pip-header');
                const resizeHandle = container.querySelector('.pip-resize-handle');
                const toggleBtn = container.querySelector('.pip-toggle');
                const closeBtn = container.querySelector('.pip-close');

                // --- Dragging ---
                header.addEventListener('mousedown', e => {
                    if (e.target.closest('.pip-btn')) return;
                    header._dragging = true;
                    header._dragX = e.clientX - container.offsetLeft;
                    header._dragY = e.clientY - container.offsetTop;
                    container.style.transition = 'none';
                    // Bring to front
                    document.querySelectorAll('.pip-container').forEach(c => c.style.zIndex = '100');
                    container.style.zIndex = '200';
                });

                // --- Resizing ---
                resizeHandle.addEventListener('mousedown', e => {
                    resizeHandle._resizing = true;
                    resizeHandle._rx = e.clientX;
                    resizeHandle._ry = e.clientY;
                    resizeHandle._sw = container.offsetWidth;
                    resizeHandle._sh = container.offsetHeight;
                    e.preventDefault();
                });

                // --- Minimize / Restore ---
                toggleBtn.addEventListener('click', () => {
                    if (container.classList.contains('minimized')) {
                        container.classList.remove('minimized');
                        toggleBtn.textContent = '−';
                    } else {
                        container.classList.add('minimized');
                        toggleBtn.textContent = '+';
                    }
                });

                // --- Close ---
                closeBtn.addEventListener('click', () => {
                    container.style.display = 'none';
                });
            });

            // Shared mouse move/up handlers for all containers
            document.addEventListener('mousemove', e => {
                document.querySelectorAll('.pip-container').forEach(container => {
                    const header = container.querySelector('.pip-header');
                    const resizeHandle = container.querySelector('.pip-resize-handle');

                    if (header._dragging) {
                        container.style.left = (e.clientX - header._dragX) + 'px';
                        container.style.top = (e.clientY - header._dragY) + 'px';
                        container.style.right = 'auto';
                        container.style.bottom = 'auto';
                    }
                    if (resizeHandle._resizing) {
                        const MAX_W = Math.min(960, innerWidth - 40);
                        const MAX_H = Math.min(540, innerHeight - 40);
                        let newW = Math.max(MIN_W, Math.min(MAX_W, resizeHandle._sw + (e.clientX - resizeHandle._rx)));
                        let newH = Math.max(MIN_H, Math.min(MAX_H, resizeHandle._sh + (e.clientY - resizeHandle._ry)));
                        container.style.width = newW + 'px';
                        container.style.height = newH + 'px';
                    }
                });
            });

            document.addEventListener('mouseup', () => {
                document.querySelectorAll('.pip-container').forEach(container => {
                    container.querySelector('.pip-header')._dragging = false;
                    container.querySelector('.pip-resize-handle')._resizing = false;
                });
            });
        })();
    </script>
